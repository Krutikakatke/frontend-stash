<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #5178bc 0%, #651414 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgb(255, 255, 255);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 600px;
        padding: 40px;
      }

      h1 {
        color: #667eea;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5em;
      }

      .input-section {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
      }

      #taskInput {
        flex: 1;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      #taskInput:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        padding: 15px 30px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }

      #addBtn {
        background: #667eea;
        color: white;
      }

      #addBtn:hover {
        background: #5568d3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      #clearAllBtn {
        background: #f44336;
        color: white;
        width: 100%;
        margin-top: 20px;
      }

      #clearAllBtn:hover {
        background: #da190b;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
      }

      .tasks-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .tasks-header h2 {
        color: #333;
      }

      .task-count {
        background: #667eea;
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 14px;
      }

      #taskList {
        list-style: none;
        max-height: 400px;
        overflow-y: auto;
      }

      #taskList::-webkit-scrollbar {
        width: 8px;
      }

      #taskList::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }

      #taskList::-webkit-scrollbar-thumb {
        background: #667eea;
        border-radius: 10px;
      }

      .task-item {
        background: #f8f9fa;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .task-text {
        flex: 1;
        color: #333;
        word-break: break-word;
      }

      .task-number {
        background: #667eea;
        color: white;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-right: 15px;
        font-size: 14px;
      }

      .delete-btn {
        background: #f44336;
        color: white;
        padding: 8px 15px;
        font-size: 14px;
      }

      .delete-btn:hover {
        background: #da190b;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
        font-size: 18px;
      }

      .empty-state::before {
        content: "📝";
        display: block;
        font-size: 60px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>✨ Task Manager</h1>

      <div class="input-section">
        <input
          type="text"
          id="taskInput"
          placeholder="Enter a new task..."
          onkeypress="if(event.key === 'Enter') addTask()"
        />
        <button id="addBtn" onclick="addTask()">Add Task</button>
      </div>

      <div class="tasks-header">
        <h2>Your Tasks</h2>
        <span class="task-count" id="taskCount">0 tasks</span>
      </div>

      <ul id="taskList"></ul>

      <button id="clearAllBtn" onclick="clearAllTasks()">
        Clear All Tasks
      </button>
    </div>

    <script>
      let tasks = [];

      function loadTasks() {
        const stored = localStorage.getItem("tasks");
        if (stored) {
          tasks = JSON.parse(stored);
        }
        renderTasks();
      }

      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      function addTask() {
        const input = document.getElementById("taskInput");
        const taskText = input.value.trim();

        if (taskText === "") {
          alert("Please enter a task!");
          return;
        }

        tasks.push(taskText);
        saveTasks();
        renderTasks();
        input.value = "";
        input.focus();
      }

      function deleteTask(index) {
        if (confirm("Are you sure you want to delete this task?")) {
          tasks.splice(index, 1);
          saveTasks();
          renderTasks();
        }
      }

      function clearAllTasks() {
        if (tasks.length === 0) {
          alert("No tasks to clear!");
          return;
        }

        if (confirm("Are you sure you want to delete all tasks?")) {
          tasks = [];
          saveTasks();
          renderTasks();
        }
      }

      function renderTasks() {
        const taskList = document.getElementById("taskList");
        const taskCount = document.getElementById("taskCount");

        taskCount.textContent = `${tasks.length} task${
          tasks.length !== 1 ? "s" : ""
        }`;

        if (tasks.length === 0) {
          taskList.innerHTML =
            '<div class="empty-state">No tasks yet. Add one to get started!</div>';
          return;
        }

        taskList.innerHTML = tasks
          .map(
            (task, index) => `
                <li class="task-item">
                    <div class="task-number">${index + 1}</div>
                    <div class="task-text">${escapeHtml(task)}</div>
                    <button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
                </li>
            `
          )
          .join("");
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Load tasks on page load
      loadTasks();
    </script>
  </body>
</html>
